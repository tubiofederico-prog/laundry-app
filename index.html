<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaundryHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { margin: 0; padding: 0; overflow: hidden; background: #f3f4f6; }
        html, body, #app { height: 100%; }
        .app-container { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .phone { width: 100%; max-width: 448px; height: 100vh; max-height: 900px; background: white; border-radius: 48px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); display: flex; flex-direction: column; overflow: hidden; }
        .content { flex: 1; overflow-y: auto; overflow-x: hidden; scroll-behavior: smooth; padding-bottom: 80px; }
        .tabbar { border-top: 2px solid #e5e7eb; padding: 12px; background: white; position: absolute; bottom: 0; width: 100%; max-width: 448px; flex-shrink: 0; }
        .tab-btn { display: flex; flex-direction: column; align-items: center; padding: 8px 16px; border-radius: 8px; transition: all 0.2s; cursor: pointer; }
        .tab-btn.active { background: #f3e8ff; color: #a855f7; }
        .tab-btn:not(.active) { color: #9ca3af; }
        .tab-btn span:first-child { font-size: 20px; margin-bottom: 4px; }
        .tab-btn span:last-child { font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState } = React;

        const SERVICES = [
            { id: 1, icon: '👕', name: 'Lavado Completo', desc: 'Lavado, secado y planchado', price: 12.99 },
            { id: 2, icon: '⚡', name: 'Lavado Exprés', desc: 'Lavado y secado', price: 8.99 },
            { id: 3, icon: '🔥', name: 'Planchado', desc: 'Profesional', price: 4.99 },
            { id: 4, icon: '✨', name: 'Delicado', desc: 'Prendas sensibles', price: 15.99 },
            { id: 5, icon: '💪', name: 'Deportivo', desc: 'Ropa deportiva', price: 10.99 },
            { id: 6, icon: '👑', name: 'Premium', desc: 'Todo + aroma', price: 19.99 },
        ];

        const ORDERS = [
            { id: '#12345', name: 'Lavado Completo', date: '5 de Mayo', items: 5, price: '$12.99', status: 'Entregado' },
            { id: '#12344', name: 'Lavado Exprés', date: '3 de Mayo', items: 3, price: '$8.99', status: 'Entregado' },
            { id: '#12343', name: 'Premium', date: '1 de Mayo', items: 8, price: '$19.99', status: 'Entregado' },
        ];

        function HomeScreen({ onOrderClick }) {
            return (
                <div className="p-6 space-y-6 pb-24">
                    <div>
                        <p className="text-xs text-purple-600 font-bold uppercase">Bienvenido</p>
                        <h1 className="text-2xl font-bold text-gray-900">Carolina García</h1>
                    </div>

                    <button
                        onClick={onOrderClick}
                        className="w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white font-bold py-4 px-6 rounded-2xl hover:shadow-lg hover:scale-105 transition"
                    >
                        ✨ Solicitar servicio
                    </button>

                    <div className="bg-white border-2 border-gray-200 rounded-2xl p-4">
                        <div className="flex justify-between items-start mb-3">
                            <div>
                                <p className="text-sm text-gray-600">#12345</p>
                                <p className="font-bold text-gray-900">Lavado Completo</p>
                            </div>
                            <span className="bg-green-100 text-green-700 text-xs font-bold px-2 py-1 rounded-full">✓ Entregado</span>
                        </div>
                        <p className="text-sm text-gray-600">5 de Mayo • 5 prendas</p>
                        <p className="font-bold text-purple-600 mt-2">$12.99</p>
                    </div>

                    <div className="grid grid-cols-2 gap-3">
                        <button
                            onClick={onOrderClick}
                            className="bg-white border-2 border-gray-200 rounded-2xl p-4 text-center hover:shadow-lg hover:scale-105 transition"
                        >
                            <span className="text-3xl">🏃</span>
                            <p className="font-bold text-gray-900 text-sm mt-2">Rápido</p>
                        </button>
                        <button className="bg-white border-2 border-gray-200 rounded-2xl p-4 text-center hover:shadow-lg hover:scale-105 transition">
                            <span className="text-3xl">🎁</span>
                            <p className="font-bold text-gray-900 text-sm mt-2">Ofertas</p>
                        </button>
                    </div>
                </div>
            );
        }

        function SelectServiceScreen({ onBack, onSelect }) {
            return (
                <div className="p-6 space-y-4 pb-24">
                    <div className="flex items-center gap-3 mb-4">
                        <button onClick={onBack} className="text-2xl hover:scale-125 transition">←</button>
                        <h2 className="text-xl font-bold">Servicios</h2>
                    </div>

                    {SERVICES.map(service => (
                        <button
                            key={service.id}
                            onClick={() => onSelect(service)}
                            className="w-full bg-white border-2 border-gray-200 rounded-2xl p-4 flex gap-4 hover:shadow-lg hover:border-purple-300 hover:scale-102 transition text-left"
                        >
                            <div className="w-16 h-16 bg-purple-100 rounded-lg flex items-center justify-center text-2xl flex-shrink-0">{service.icon}</div>
                            <div className="flex-1 min-w-0">
                                <p className="font-bold text-gray-900">{service.name}</p>
                                <p className="text-xs text-gray-600">{service.desc}</p>
                                <p className="font-bold text-purple-600 text-lg mt-1">${service.price.toFixed(2)}</p>
                            </div>
                        </button>
                    ))}
                </div>
            );
        }

        function CheckoutScreen({ service, onBack, onPay }) {
            const [address, setAddress] = useState('Calle Principal 123');
            const [date, setDate] = useState('Hoy');
            const [time, setTime] = useState('10:00 AM');

            return (
                <div className="p-6 space-y-4 pb-24">
                    <div className="flex items-center gap-3 mb-4">
                        <button onClick={onBack} className="text-2xl hover:scale-125 transition">←</button>
                        <h2 className="text-xl font-bold">Detalles</h2>
                    </div>

                    <div className="bg-gradient-to-br from-purple-100 to-blue-100 rounded-2xl p-4 flex gap-3">
                        <div className="text-4xl flex-shrink-0">{service.icon}</div>
                        <div className="flex-1">
                            <p className="font-bold text-gray-900">{service.name}</p>
                            <p className="text-sm text-gray-600">{service.desc}</p>
                            <p className="font-bold text-purple-600 text-lg mt-1">${service.price.toFixed(2)}</p>
                        </div>
                    </div>

                    <div className="space-y-3">
                        <div>
                            <label className="text-sm font-bold text-gray-700 block mb-2">📍 Dirección</label>
                            <input
                                type="text"
                                value={address}
                                onChange={(e) => setAddress(e.target.value)}
                                className="w-full border-2 border-gray-200 rounded-xl px-4 py-2 focus:outline-none focus:border-purple-600"
                            />
                        </div>

                        <div>
                            <label className="text-sm font-bold text-gray-700 block mb-2">📅 Fecha</label>
                            <select
                                value={date}
                                onChange={(e) => setDate(e.target.value)}
                                className="w-full border-2 border-gray-200 rounded-xl px-4 py-2 focus:outline-none focus:border-purple-600"
                            >
                                <option>Hoy</option>
                                <option>Mañana</option>
                                <option>Pasado mañana</option>
                            </select>
                        </div>

                        <div>
                            <label className="text-sm font-bold text-gray-700 block mb-2">🕐 Hora</label>
                            <select
                                value={time}
                                onChange={(e) => setTime(e.target.value)}
                                className="w-full border-2 border-gray-200 rounded-xl px-4 py-2 focus:outline-none focus:border-purple-600"
                            >
                                <option>08:00 AM</option>
                                <option>09:00 AM</option>
                                <option>10:00 AM</option>
                                <option>11:00 AM</option>
                                <option>12:00 PM</option>
                                <option>02:00 PM</option>
                                <option>03:00 PM</option>
                                <option>04:00 PM</option>
                            </select>
                        </div>
                    </div>

                    <div className="bg-gray-50 rounded-2xl p-4 space-y-2 mt-6">
                        <div className="flex justify-between">
                            <span className="text-gray-600">Servicio</span>
                            <span className="font-bold">${service.price.toFixed(2)}</span>
                        </div>
                        <div className="flex justify-between">
                            <span className="text-gray-600">Envío</span>
                            <span className="font-bold">$2.00</span>
                        </div>
                        <div className="border-t border-gray-200 pt-2 flex justify-between">
                            <span className="font-bold">Total</span>
                            <span className="font-bold text-lg text-purple-600">${(service.price + 2.00).toFixed(2)}</span>
                        </div>
                    </div>

                    <button
                        onClick={onPay}
                        className="w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white font-bold py-4 px-6 rounded-2xl hover:shadow-lg hover:scale-105 transition"
                    >
                        Continuar al Pago
                    </button>
                </div>
            );
        }

        function PaymentScreen({ service, onBack, onSuccess }) {
            const [loading, setLoading] = useState(false);

            const handlePay = () => {
                setLoading(true);
                setTimeout(() => {
                    onSuccess();
                }, 2000);
            };

            return (
                <div className="p-6 space-y-4 pb-24">
                    <div className="flex items-center gap-3 mb-4">
                        <button onClick={onBack} disabled={loading} className="text-2xl hover:scale-125 transition disabled:opacity-50">←</button>
                        <h2 className="text-xl font-bold">Pago</h2>
                    </div>

                    <div className="bg-gradient-to-br from-purple-600 to-blue-600 text-white rounded-2xl p-6 shadow-lg">
                        <p className="text-xs text-purple-100 mb-4">Tarjeta de Crédito</p>
                        <div className="text-2xl font-bold tracking-wider mb-8">•••• •••• •••• 4242</div>
                        <div className="flex justify-between items-end">
                            <div>
                                <p className="text-xs text-purple-100">Titular</p>
                                <p className="font-bold">CAROLINA GARCIA</p>
                            </div>
                            <div className="text-right">
                                <p className="text-xs text-purple-100">Vence</p>
                                <p className="font-bold">12/26</p>
                            </div>
                        </div>
                    </div>

                    {loading ? (
                        <div className="text-center py-12">
                            <div className="inline-block animate-spin">
                                <div className="w-16 h-16 border-4 border-purple-200 border-t-purple-600 rounded-full"></div>
                            </div>
                            <p className="mt-4 font-bold text-gray-900">Procesando pago...</p>
                        </div>
                    ) : (
                        <>
                            <div className="bg-blue-50 border-2 border-blue-300 rounded-2xl p-4">
                                <p className="text-sm text-blue-900 font-bold">✓ Pago seguro</p>
                                <p className="text-xs text-blue-800 mt-2">Tu información está protegida</p>
                            </div>

                            <button
                                onClick={handlePay}
                                className="w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white font-bold py-4 px-6 rounded-2xl hover:shadow-lg hover:scale-105 transition"
                            >
                                Pagar ${(service.price + 2.00).toFixed(2)}
                            </button>
                        </>
                    )}
                </div>
            );
        }

        function TrackingScreen() {
            const [progress, setProgress] = useState(1);

            React.useEffect(() => {
                const interval = setInterval(() => {
                    setProgress(prev => prev < 4 ? prev + 1 : 4);
                }, 3000);
                return () => clearInterval(interval);
            }, []);

            const statuses = ['Confirmado', 'En camino', 'En proceso', 'Entregando'];

            return (
                <div className="p-6 space-y-4 pb-24">
                    <h2 className="text-xl font-bold mb-4">Tu Rastreo</h2>

                    <div className="bg-blue-50 border-2 border-blue-300 rounded-2xl p-4">
                        <p className="text-sm text-blue-900 font-bold">✓ Tu ropa está en camino</p>
                        <p className="text-xs text-blue-800 mt-2">📍 A 2.3 km de tu hogar</p>
                        <p className="text-xs text-blue-800">⏰ Llegará en ~{Math.max(1, 10 - progress * 2)} minutos</p>
                    </div>

                    <div className="space-y-3">
                        {statuses.map((status, i) => (
                            <div key={i} className="flex gap-3">
                                <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold flex-shrink-0 transition ${i < progress ? 'bg-purple-600 text-white' : 'bg-gray-200 text-gray-400'}`}>
                                    {i < progress ? '✓' : i + 1}
                                </div>
                                <div className="flex-1">
                                    <p className={`font-bold ${i < progress ? 'text-gray-900' : 'text-gray-400'}`}>{status}</p>
                                    {i === progress - 1 && <p className="text-xs text-purple-600 font-bold mt-1">En progreso...</p>}
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="bg-purple-50 border-2 border-purple-200 rounded-2xl p-4 mt-6">
                        <p className="text-sm font-bold text-gray-900">👤 Tu conductor</p>
                        <p className="text-xs text-gray-600 mt-1">Juan García • ⭐⭐⭐⭐⭐ (4.9)</p>
                    </div>
                </div>
            );
        }

        function HistoryScreen() {
            return (
                <div className="p-6 space-y-4 pb-24">
                    <h2 className="text-xl font-bold mb-4">Historial</h2>
                    {ORDERS.map((order, i) => (
                        <div key={i} className="bg-white border-2 border-gray-200 rounded-2xl p-4 hover:shadow-lg hover:scale-102 transition cursor-pointer">
                            <div className="flex justify-between mb-2">
                                <div>
                                    <p className="text-sm text-gray-600">{order.id}</p>
                                    <p className="font-bold text-gray-900">{order.name}</p>
                                </div>
                                <span className="bg-green-100 text-green-700 text-xs font-bold px-2 py-1 rounded-full">✓</span>
                            </div>
                            <p className="text-sm text-gray-600">{order.date} • {order.items} prendas • {order.price}</p>
                        </div>
                    ))}
                </div>
            );
        }

        function ProfileScreen() {
            return (
                <div className="bg-gradient-to-br from-purple-600 to-blue-600 text-white p-6 min-h-screen pb-24">
                    <div className="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center text-3xl mb-4">👤</div>
                    <h1 className="text-2xl font-bold">Carolina García</h1>
                    <p className="text-purple-100">carolina@example.com</p>

                    <div className="bg-white/10 rounded-2xl p-4 mt-6">
                        <p className="text-xs text-purple-100">Saldo disponible</p>
                        <p className="text-3xl font-bold">$15.50</p>
                    </div>

                    <div className="mt-8 space-y-3">
                        <button className="w-full bg-white/20 hover:bg-white/30 transition rounded-xl px-4 py-3 font-bold text-left">
                            ⚙️ Configuración
                        </button>
                        <button className="w-full bg-white/20 hover:bg-white/30 transition rounded-xl px-4 py-3 font-bold text-left">
                            📞 Soporte
                        </button>
                        <button className="w-full bg-white/20 hover:bg-white/30 transition rounded-xl px-4 py-3 font-bold text-left">
                            📋 Términos y Privacidad
                        </button>
                    </div>
                </div>
            );
        }

        function App() {
            const [screen, setScreen] = useState('home');
            const [selectedService, setSelectedService] = useState(null);

            const handleSelectService = (service) => {
                setSelectedService(service);
                setScreen('checkout');
            };

            const handlePaymentSuccess = () => {
                setScreen('tracking');
            };

            return (
                <div className="app-container">
                    <div className="phone">
                        <div className="content">
                            {screen === 'home' && <HomeScreen onOrderClick={() => setScreen('selectservice')} />}
                            {screen === 'selectservice' && <SelectServiceScreen onBack={() => setScreen('home')} onSelect={handleSelectService} />}
                            {screen === 'checkout' && selectedService && <CheckoutScreen service={selectedService} onBack={() => setScreen('selectservice')} onPay={() => setScreen('payment')} />}
                            {screen === 'payment' && selectedService && <PaymentScreen service={selectedService} onBack={() => setScreen('checkout')} onSuccess={handlePaymentSuccess} />}
                            {screen === 'tracking' && <TrackingScreen />}
                            {screen === 'history' && <HistoryScreen />}
                            {screen === 'profile' && <ProfileScreen />}
                        </div>

                        <div className="tabbar">
                            <div className="flex justify-around">
                                <button onClick={() => setScreen('home')} className={`tab-btn ${screen === 'home' ? 'active' : ''}`}>
                                    <span>🏠</span>
                                    <span>Inicio</span>
                                </button>
                                <button onClick={() => setScreen('history')} className={`tab-btn ${screen === 'history' ? 'active' : ''}`}>
                                    <span>📋</span>
                                    <span>Historial</span>
                                </button>
                                <button onClick={() => setScreen('tracking')} className={`tab-btn ${screen === 'tracking' ? 'active' : ''}`}>
                                    <span>📍</span>
                                    <span>Rastreo</span>
                                </button>
                                <button onClick={() => setScreen('profile')} className={`tab-btn ${screen === 'profile' ? 'active' : ''}`}>
                                    <span>⚙️</span>
                                    <span>Perfil</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('app')).render(<App />);
    </script>
</body>
</html>
