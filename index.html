<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaundryHub - Lavandería Under Demand</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #eef2f8 100%);
            overflow: hidden;
        }

        .mobile-container {
            height: 100vh;
            width: 100%;
            max-width: 390px;
            margin: 0 auto;
            background: white;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            border-radius: 40px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .screen-wrapper {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            scroll-behavior: smooth;
            padding-bottom: 80px;
        }

        .screen-wrapper::-webkit-scrollbar {
            width: 6px;
        }

        .screen-wrapper::-webkit-scrollbar-track {
            background: transparent;
        }

        .screen-wrapper::-webkit-scrollbar-thumb {
            background: rgba(124, 58, 237, 0.3);
            border-radius: 3px;
        }

        .btn-primary {
            @apply w-full bg-gradient-to-r from-purple-600 to-purple-700 hover:from-purple-700 hover:to-purple-800 text-white font-bold py-3.5 px-6 rounded-2xl transition-all duration-200 transform hover:scale-105 active:scale-95 shadow-lg hover:shadow-xl;
        }

        .btn-secondary {
            @apply w-full bg-gray-100 hover:bg-gray-200 text-gray-900 font-semibold py-3 px-4 rounded-2xl transition-all duration-200;
        }

        .btn-ghost {
            @apply text-purple-600 font-semibold py-2 px-4 rounded-lg hover:bg-purple-50 transition-colors;
        }

        .input-field {
            @apply w-full px-4 py-3.5 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-100 transition-all bg-white;
        }

        .card {
            @apply bg-white border-2 border-gray-100 rounded-2xl shadow-sm hover:shadow-lg transition-all p-5 backdrop-blur-sm;
        }

        .card-gradient {
            @apply bg-gradient-to-br from-purple-50 to-blue-50 border-2 border-purple-100 rounded-2xl p-6 shadow-sm;
        }

        .section-divider {
            @apply w-full h-0.5 bg-gradient-to-r from-transparent via-gray-200 to-transparent my-8;
        }

        .screen {
            display: none;
            animation: fadeIn 0.4s ease-in-out;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .badge {
            @apply inline-flex items-center px-3 py-1 rounded-full text-xs font-bold;
        }

        .badge-success {
            @apply bg-green-100 text-green-700;
        }

        .badge-processing {
            @apply bg-blue-100 text-blue-700;
        }

        .tab-nav {
            @apply fixed bottom-0 left-1/2 transform -translate-x-1/2 w-full max-w-96 bg-white border-t-2 border-gray-100 px-4 py-3 flex justify-around items-center rounded-t-3xl shadow-2xl;
        }

        .tab-item {
            @apply flex flex-col items-center justify-center py-2 px-5 rounded-xl transition-all duration-200;
        }

        .tab-item.active {
            @apply bg-purple-100 text-purple-600;
        }

        .tab-item:not(.active) {
            @apply text-gray-500 hover:text-gray-700;
        }

        .progress-line {
            @apply absolute left-0 top-0 h-1 bg-gradient-to-r from-purple-600 to-blue-600 transition-all duration-500;
        }

        .header-sticky {
            @apply sticky top-0 bg-white/95 backdrop-blur-md border-b-2 border-gray-100 px-6 py-4 z-40;
        }

        .service-card {
            @apply card cursor-pointer group transform transition-all duration-300 hover:scale-105 hover:shadow-xl hover:border-purple-300;
        }

        .status-progress {
            @apply flex items-center justify-between relative;
        }

        .status-dot {
            @apply w-12 h-12 rounded-full flex items-center justify-center font-bold text-lg relative z-10 transition-all duration-300;
        }

        .status-line {
            @apply absolute top-6 left-0 right-0 h-1 -z-10;
        }

        .loader {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .shimmer {
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="flex items-center justify-center min-h-screen">
        <div class="mobile-container">
            <div class="screen-wrapper" id="screenWrapper"></div>
            <nav class="tab-nav" id="tabNav"></nav>
        </div>
    </div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ICONOGRAFÍA
        const Icons = {
            sparkles: "✨",
            arrow: "→",
            back: "←",
            phone: "📱",
            email: "✉️",
            home: "🏠",
            clock: "⏱️",
            location: "📍",
            calendar: "📅",
            check: "✓",
            checkmark: "✓",
            truck: "🚚",
            history: "📋",
            settings: "⚙️",
            user: "👤",
            logout: "🚪",
            phone_call: "📞",
            chat: "💬",
            package: "📦",
            process: "🌀",
            fire: "🔥",
            crown: "👑",
            lightning: "⚡",
            heart: "❤️",
            shield: "🛡️",
            check_circle: "✓",
            gift: "🎁",
            help: "❓",
            pay: "💳",
            lock: "🔒",
            success: "🎉",
            cycle: "🔄",
            download: "📥",
            happy: "😊",
        };

        // PANTALLA: Onboarding Premium
        function Onboarding({ onNext }) {
            return (
                <div className="screen active flex flex-col h-full justify-between p-8">
                    <div className="flex-1 flex flex-col items-center justify-center space-y-10">
                        <div className="relative w-32 h-32">
                            <div className="absolute inset-0 bg-gradient-to-br from-purple-500 via-purple-600 to-blue-600 rounded-3xl shadow-2xl flex items-center justify-center">
                                <span className="text-6xl">🧺</span>
                            </div>
                            <div className="absolute -inset-2 bg-gradient-to-br from-purple-400 to-blue-400 rounded-3xl opacity-20 blur-xl"></div>
                        </div>

                        <div className="text-center space-y-6">
                            <div className="space-y-3">
                                <h1 className="text-5xl font-bold text-gray-900 leading-tight">
                                    Ropa Limpia
                                </h1>
                                <p className="text-5xl font-bold bg-gradient-to-r from-purple-600 to-blue-600 bg-clip-text text-transparent">
                                    en 3 horas
                                </p>
                            </div>

                            <p className="text-lg text-gray-600 leading-relaxed max-w-xs font-medium">
                                Recogemos, lavamos y entregamos en tu puerta. Cero esfuerzo, máxima calidad.
                            </p>

                            <div className="flex justify-center gap-2 pt-2">
                                <div className="w-2.5 h-2.5 rounded-full bg-purple-600"></div>
                                <div className="w-2.5 h-2.5 rounded-full bg-purple-400"></div>
                                <div className="w-2.5 h-2.5 rounded-full bg-purple-200"></div>
                            </div>
                        </div>
                    </div>

                    <div className="space-y-3 pb-4">
                        <button onClick={() => onNext('login')} className="btn-primary">
                            Comenzar ahora
                        </button>
                        <button onClick={() => onNext('login')} className="btn-secondary">
                            Más información
                        </button>
                    </div>
                </div>
            );
        }

        // PANTALLA: Login Premium
        function Login({ onNext }) {
            const [step, setStep] = useState('choose');
            const [loginType, setLoginType] = useState(null);
            const [phone, setPhone] = useState('+34 ');
            const [email, setEmail] = useState('');
            const [code, setCode] = useState('');

            return (
                <div className="screen active flex flex-col h-full">
                    {step !== 'choose' && (
                        <div className="header-sticky flex items-center gap-4">
                            <button onClick={() => setStep('choose')} className="p-2.5 hover:bg-gray-100 rounded-lg transition-colors">
                                <span className="text-2xl">{Icons.back}</span>
                            </button>
                            <h2 className="text-xl font-bold text-gray-900">Acceso a tu cuenta</h2>
                        </div>
                    )}

                    <div className="flex-1 flex flex-col items-center justify-center px-6 space-y-6">
                        {step === 'choose' && (
                            <>
                                <div className="text-center mb-4">
                                    <h1 className="text-3xl font-bold text-gray-900">¡Bienvenido!</h1>
                                    <p className="text-gray-600 mt-2">Elige cómo acceder</p>
                                </div>

                                <div className="w-full space-y-3">
                                    <button onClick={() => { setLoginType('phone'); setStep('enter'); }} className="service-card flex items-center space-x-5 py-5 px-6">
                                        <div className="w-14 h-14 bg-gradient-to-br from-blue-100 to-cyan-100 rounded-2xl flex items-center justify-center text-2xl">
                                            {Icons.phone}
                                        </div>
                                        <div className="text-left flex-1">
                                            <p className="font-bold text-gray-900 text-lg">Teléfono</p>
                                            <p className="text-sm text-gray-600">Código de 4 dígitos</p>
                                        </div>
                                        <span className="text-2xl text-gray-400">{Icons.arrow}</span>
                                    </button>

                                    <button onClick={() => { setLoginType('email'); setStep('enter'); }} className="service-card flex items-center space-x-5 py-5 px-6">
                                        <div className="w-14 h-14 bg-gradient-to-br from-purple-100 to-pink-100 rounded-2xl flex items-center justify-center text-2xl">
                                            {Icons.email}
                                        </div>
                                        <div className="text-left flex-1">
                                            <p className="font-bold text-gray-900 text-lg">Correo</p>
                                            <p className="text-sm text-gray-600">Acceso rápido</p>
                                        </div>
                                        <span className="text-2xl text-gray-400">{Icons.arrow}</span>
                                    </button>
                                </div>
                            </>
                        )}

                        {step === 'enter' && loginType === 'phone' && (
                            <form onSubmit={(e) => { e.preventDefault(); setStep('verify'); }} className="w-full space-y-6">
                                <div>
                                    <label className="block text-sm font-bold text-gray-900 mb-3">Número de teléfono</label>
                                    <input type="tel" value={phone} onChange={(e) => setPhone(e.target.value)} placeholder="+34 600 000 000" className="input-field text-lg" />
                                </div>
                                <button type="submit" className="btn-primary">Continuar</button>
                            </form>
                        )}

                        {step === 'enter' && loginType === 'email' && (
                            <form onSubmit={(e) => { e.preventDefault(); setStep('verify'); }} className="w-full space-y-6">
                                <div>
                                    <label className="block text-sm font-bold text-gray-900 mb-3">Correo electrónico</label>
                                    <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="tu@email.com" className="input-field text-lg" />
                                </div>
                                <button type="submit" className="btn-primary">Continuar</button>
                            </form>
                        )}

                        {step === 'verify' && (
                            <form onSubmit={(e) => { e.preventDefault(); onNext('home'); }} className="w-full space-y-6">
                                <div className="text-center space-y-3">
                                    <p className="text-gray-900 font-semibold">Código de verificación</p>
                                    <p className="text-sm text-gray-600">Hemos enviado un código a:</p>
                                    <p className="font-bold text-purple-600 break-all">{loginType === 'phone' ? phone : email}</p>
                                </div>

                                <div>
                                    <input type="text" maxLength="4" value={code} onChange={(e) => setCode(e.target.value)} placeholder="0000" className="input-field text-center text-4xl tracking-widest font-bold letter-spacing-lg" />
                                </div>

                                <button type="submit" className="btn-primary">Verificar y acceder</button>
                                <button type="button" onClick={() => setStep('enter')} className="btn-ghost w-full">Cambiar contacto</button>
                            </form>
                        )}
                    </div>
                </div>
            );
        }

        // PANTALLA: Home Mejorada
        function Home({ onNext }) {
            return (
                <div className="screen active flex flex-col h-full">
                    <div className="header-sticky">
                        <div className="space-y-1">
                            <p className="text-xs font-bold text-purple-600 uppercase tracking-wider">Bienvenido de vuelta</p>
                            <h1 className="text-2xl font-bold text-gray-900">Carolina García</h1>
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col px-6 py-8 space-y-8">
                        {/* CTA Principal */}
                        <button onClick={() => onNext('service')} className="relative overflow-hidden group">
                            <div className="absolute inset-0 bg-gradient-to-r from-purple-600 via-purple-700 to-blue-600 rounded-3xl shadow-xl group-hover:shadow-2xl transition-all duration-300 group-hover:scale-105"></div>
                            <div className="relative px-6 py-8 flex items-center justify-between text-white">
                                <div className="text-left">
                                    <p className="text-sm font-semibold opacity-90 uppercase tracking-wider">Solicita ahora</p>
                                    <p className="text-3xl font-bold mt-1">Tu lavandería</p>
                                </div>
                                <span className="text-5xl group-hover:scale-125 transition-transform">{Icons.sparkles}</span>
                            </div>
                        </button>

                        <div className="section-divider"></div>

                        {/* Último Pedido */}
                        <div>
                            <div className="flex items-center justify-between mb-4">
                                <h2 className="text-lg font-bold text-gray-900">Último pedido</h2>
                                <span className="text-xs font-bold text-purple-600 uppercase">Entregado</span>
                            </div>

                            <div className="card group cursor-pointer">
                                <div className="flex items-start justify-between mb-4">
                                    <div>
                                        <p className="text-sm text-gray-600 font-semibold">#12345</p>
                                        <p className="text-gray-900 font-bold text-lg mt-1">Lavado Completo</p>
                                    </div>
                                    <span className="badge badge-success">{Icons.checkmark} Entregado</span>
                                </div>

                                <div className="space-y-3 pt-4 border-t-2 border-gray-100">
                                    <div className="flex items-center justify-between text-sm">
                                        <span className="text-gray-600">5 de Mayo • 5 prendas</span>
                                        <span className="text-purple-600 font-bold">$12.99</span>
                                    </div>
                                </div>

                                <button className="w-full mt-4 py-2 px-4 bg-purple-50 text-purple-600 font-bold rounded-lg hover:bg-purple-100 transition-colors text-sm">
                                    Ver detalles
                                </button>
                            </div>
                        </div>

                        <div className="section-divider"></div>

                        {/* Accesos Rápidos */}
                        <div>
                            <h2 className="text-lg font-bold text-gray-900 mb-4">Acceso rápido</h2>
                            <div className="grid grid-cols-2 gap-4">
                                <button onClick={() => onNext('service')} className="service-card text-center py-8 flex flex-col items-center justify-center space-y-3">
                                    <span className="text-4xl">🏃</span>
                                    <p className="font-bold text-gray-900">Pedido Rápido</p>
                                </button>

                                <button onClick={() => onNext('history')} className="service-card text-center py-8 flex flex-col items-center justify-center space-y-3">
                                    <span className="text-4xl">{Icons.history}</span>
                                    <p className="font-bold text-gray-900">Historial</p>
                                </button>

                                <button className="service-card text-center py-8 flex flex-col items-center justify-center space-y-3">
                                    <span className="text-4xl">{Icons.gift}</span>
                                    <p className="font-bold text-gray-900">Ofertas</p>
                                </button>

                                <button className="service-card text-center py-8 flex flex-col items-center justify-center space-y-3">
                                    <span className="text-4xl">{Icons.help}</span>
                                    <p className="font-bold text-gray-900">Soporte</p>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // PANTALLA: Seleccionar Servicio Mejorada
        function SelectService({ onNext }) {
            const [selected, setSelected] = useState(null);

            const services = [
                { id: 1, name: 'Lavado Completo', desc: 'Lavado, secado y planchado', price: '12.99', icon: '👕', color: 'from-blue-500 to-cyan-500' },
                { id: 2, name: 'Lavado Exprés', desc: 'Solo lavado y secado', price: '8.99', icon: '⚡', color: 'from-yellow-500 to-orange-500' },
                { id: 3, name: 'Planchado Pro', desc: 'Planchado profesional', price: '4.99', icon: '🔥', color: 'from-red-500 to-pink-500' },
                { id: 4, name: 'Lavado Delicado', desc: 'Prendas sensibles', price: '15.99', icon: '✨', color: 'from-purple-500 to-pink-500' },
                { id: 5, name: 'Deportivo', desc: 'Ropa deportiva especializada', price: '10.99', icon: '💪', color: 'from-green-500 to-teal-500' },
                { id: 6, name: 'Premium Total', desc: 'Todo incluido + aroma premium', price: '19.99', icon: '👑', color: 'from-amber-500 to-orange-500' },
            ];

            return (
                <div className="screen active flex flex-col h-full">
                    <div className="header-sticky flex items-center gap-4">
                        <button onClick={() => onNext('home')} className="p-2.5 hover:bg-gray-100 rounded-lg transition-colors">
                            <span className="text-2xl">{Icons.back}</span>
                        </button>
                        <h1 className="text-xl font-bold text-gray-900">Elige tu servicio</h1>
                    </div>

                    <div className="flex-1 px-6 py-6 space-y-4 overflow-y-auto">
                        {services.map((service) => (
                            <button
                                key={service.id}
                                onClick={() => setSelected(service.id)}
                                className={`service-card w-full p-0 overflow-hidden ${selected === service.id ? 'ring-2 ring-purple-600 border-purple-300' : ''}`}
                            >
                                <div className="flex gap-4">
                                    <div className={`w-20 h-20 bg-gradient-to-br ${service.color} flex items-center justify-center text-3xl flex-shrink-0`}>
                                        {service.icon}
                                    </div>

                                    <div className="flex-1 p-4 text-left flex flex-col justify-between">
                                        <div>
                                            <h3 className="font-bold text-gray-900">{service.name}</h3>
                                            <p className="text-xs text-gray-600 mt-1">{service.desc}</p>
                                        </div>
                                        <p className="text-lg font-bold text-purple-600">${service.price}</p>
                                    </div>

                                    {selected === service.id && (
                                        <div className="w-6 h-6 bg-purple-600 rounded-full flex items-center justify-center text-white text-sm font-bold self-center mr-4">
                                            {Icons.checkmark}
                                        </div>
                                    )}
                                </div>
                            </button>
                        ))}
                    </div>

                    <div className="sticky bottom-20 left-0 right-0 bg-gradient-to-t from-white to-transparent px-6 pb-4 pt-4">
                        <button
                            onClick={() => selected && onNext('address')}
                            disabled={!selected}
                            className={`btn-primary ${!selected ? 'opacity-50 cursor-not-allowed' : ''}`}
                        >
                            Continuar con servicio
                        </button>
                    </div>
                </div>
            );
        }

        // PANTALLA: Dirección y Horario Mejorada
        function AddressSchedule({ onNext }) {
            const [address, setAddress] = useState('Calle Principal 123, Apt 4B');
            const [time, setTime] = useState('09:00');
            const [selectedDate, setSelectedDate] = useState('today');

            const dates = [
                { id: 'today', label: 'Hoy' },
                { id: 'tomorrow', label: 'Mañana' },
                { id: 'next', label: 'Próximo' },
            ];

            const times = ['08:00', '09:00', '10:00', '11:00', '12:00', '14:00', '15:00', '16:00', '17:00', '18:00'];

            return (
                <div className="screen active flex flex-col h-full">
                    <div className="header-sticky flex items-center gap-4">
                        <button onClick={() => onNext('service')} className="p-2.5 hover:bg-gray-100 rounded-lg transition-colors">
                            <span className="text-2xl">{Icons.back}</span>
                        </button>
                        <h1 className="text-xl font-bold text-gray-900">Cuándo y dónde</h1>
                    </div>

                    <div className="flex-1 px-6 py-6 space-y-8 overflow-y-auto">
                        {/* Dirección */}
                        <div className="card-gradient">
                            <label className="block text-sm font-bold text-gray-900 mb-3 flex items-center gap-2">
                                <span className="text-xl">{Icons.location}</span>
                                Dirección de recogida
                            </label>
                            <input type="text" value={address} onChange={(e) => setAddress(e.target.value)} className="input-field" />
                            <p className="text-xs text-purple-600 font-semibold mt-3">✓ Recogida gratuita en tu domicilio</p>
                        </div>

                        {/* Fecha */}
                        <div>
                            <label className="block text-sm font-bold text-gray-900 mb-3 flex items-center gap-2">
                                <span className="text-xl">{Icons.calendar}</span>
                                Fecha de recogida
                            </label>
                            <div className="grid grid-cols-3 gap-3">
                                {dates.map((date) => (
                                    <button
                                        key={date.id}
                                        onClick={() => setSelectedDate(date.id)}
                                        className={`py-3 px-4 rounded-xl font-bold transition-all duration-200 ${
                                            selectedDate === date.id
                                                ? 'bg-gradient-to-br from-purple-600 to-purple-700 text-white shadow-lg'
                                                : 'bg-gray-100 text-gray-900 hover:bg-gray-200'
                                        }`}
                                    >
                                        {date.label}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Hora */}
                        <div>
                            <label className="block text-sm font-bold text-gray-900 mb-3 flex items-center gap-2">
                                <span className="text-xl">{Icons.clock}</span>
                                Hora preferida
                            </label>
                            <div className="grid grid-cols-4 gap-2">
                                {times.map((t) => (
                                    <button
                                        key={t}
                                        onClick={() => setTime(t)}
                                        className={`py-2.5 px-2 rounded-lg font-bold text-sm transition-all duration-200 ${
                                            time === t
                                                ? 'bg-gradient-to-br from-purple-600 to-purple-700 text-white shadow-lg'
                                                : 'bg-gray-100 text-gray-900 hover:bg-gray-200'
                                        }`}
                                    >
                                        {t}
                                    </button>
                                ))}
                            </div>

                                <span className="group-hover:translate-x-1 transition-transform">{Icons.arrow}</span>
                            </button>
                        </div>

                        {/* Footer */}
                        <div className="border-t-2 border-gray-100 px-6 py-8 text-center space-y-3">
                            <p className="text-xs text-gray-600 font-semibold">LaundryHub v2.0</p>
                            <p className="text-xs text-gray-500">Hecho con {Icons.heart} por el equipo LaundryHub</p>
                            <div className="flex justify-center gap-3 pt-3">
                                <button className="text-xs text-purple-600 hover:underline font-semibold">Términos</button>
                                <span className="text-gray-300">•</span>
                                <button className="text-xs text-purple-600 hover:underline font-semibold">Privacidad</button>
                                <span className="text-gray-300">•</span>
                                <button className="text-xs text-purple-600 hover:underline font-semibold">Contacto</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // APP PRINCIPAL
        function LaundryApp() {
            const [screen, setScreen] = useState('onboarding');

            const screens = {
                onboarding: <Onboarding onNext={setScreen} />,
                login: <Login onNext={setScreen} />,
                home: <Home onNext={setScreen} />,
                service: <SelectService onNext={setScreen} />,
                address: <AddressSchedule onNext={setScreen} />,
                confirmation: <Confirmation onNext={setScreen} />,
                payment: <Payment onNext={setScreen} />,
                tracking: <Tracking onNext={setScreen} />,
                history: <OrderHistory onNext={setScreen} />,
                profile: <Profile onNext={setScreen} />,
            };

            const tabs = [
                { id: 'home', icon: Icons.home, label: 'Inicio', visible: screen !== 'onboarding' && screen !== 'login' },
                { id: 'history', icon: Icons.history, label: 'Historial', visible: screen !== 'onboarding' && screen !== 'login' },
                { id: 'tracking', icon: Icons.location, label: 'Rastreo', visible: screen !== 'onboarding' && screen !== 'login' },
                { id: 'profile', icon: Icons.settings, label: 'Perfil', visible: screen !== 'onboarding' && screen !== 'login' },
            ];

            return (
                <div className="mobile-container">
                    <div className="screen-wrapper">
                        {screens[screen]}
                    </div>

                    {tabs.some(t => t.visible) && (
                        <nav className="tab-nav">
                            {tabs.map(tab => tab.visible && (
                                <button
                                    key={tab.id}
                                    onClick={() => setScreen(tab.id)}
                                    className={`tab-item ${screen === tab.id ? 'active' : ''}`}
                                >
                                    <span className="text-2xl">{tab.icon}</span>
                                    <span className="text-xs font-bold mt-1">{tab.label}</span>
                                </button>
                            ))}
                        </nav>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('screenWrapper')).render(<LaundryApp />);
    </script>
</body>
</html>
