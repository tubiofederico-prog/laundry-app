<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaundryHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        #app { height: 100vh; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [screen, setScreen] = useState('home');

            return (
                <div className="flex items-center justify-center min-h-screen bg-gray-100">
                    <div className="w-full max-w-sm h-screen max-h-screen bg-white rounded-3xl shadow-2xl flex flex-col overflow-hidden">

                        {/* CONTENIDO */}
                        <div className="flex-1 overflow-y-auto">
                            {/* PANTALLA HOME */}
                            {screen === 'home' && (
                                <div className="p-6 space-y-6">
                                    <div>
                                        <p className="text-xs text-purple-600 font-bold uppercase">Bienvenido</p>
                                        <h1 className="text-2xl font-bold text-gray-900">Carolina García</h1>
                                    </div>

                                    <button onClick={() => setScreen('service')} className="w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white font-bold py-4 px-6 rounded-2xl hover:shadow-lg transition">
                                        ✨ Solicitar servicio
                                    </button>

                                    <div className="bg-white border-2 border-gray-200 rounded-2xl p-4">
                                        <div className="flex justify-between items-start mb-3">
                                            <div>
                                                <p className="text-sm text-gray-600">#12345</p>
                                                <p className="font-bold text-gray-900">Lavado Completo</p>
                                            </div>
                                            <span className="bg-green-100 text-green-700 text-xs font-bold px-2 py-1 rounded-full">✓ Entregado</span>
                                        </div>
                                        <div className="text-sm text-gray-600">5 de Mayo • 5 prendas</div>
                                        <div className="font-bold text-purple-600 mt-2">$12.99</div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <button onClick={() => setScreen('service')} className="bg-white border-2 border-gray-200 rounded-2xl p-4 text-center hover:shadow-lg transition">
                                            <span className="text-3xl">🏃</span>
                                            <p className="font-bold text-gray-900 text-sm mt-2">Rápido</p>
                                        </button>
                                        <button className="bg-white border-2 border-gray-200 rounded-2xl p-4 text-center hover:shadow-lg transition">
                                            <span className="text-3xl">🎁</span>
                                            <p className="font-bold text-gray-900 text-sm mt-2">Ofertas</p>
                                        </button>
                                    </div>
                                </div>
                            )}

                            {/* PANTALLA SERVICIOS */}
                            {screen === 'service' && (
                                <div className="p-6 space-y-4">
                                    <div className="flex items-center gap-3 mb-4">
                                        <button onClick={() => setScreen('home')} className="text-2xl">←</button>
                                        <h2 className="text-xl font-bold">Servicios</h2>
                                    </div>

                                    {[
                                        {icon: '👕', name: 'Lavado Completo', desc: 'Lavado, secado y planchado', price: '$12.99'},
                                        {icon: '⚡', name: 'Lavado Exprés', desc: 'Lavado y secado', price: '$8.99'},
                                        {icon: '🔥', name: 'Planchado', desc: 'Profesional', price: '$4.99'},
                                        {icon: '✨', name: 'Delicado', desc: 'Prendas sensibles', price: '$15.99'},
                                        {icon: '💪', name: 'Deportivo', desc: 'Ropa deportiva', price: '$10.99'},
                                        {icon: '👑', name: 'Premium', desc: 'Todo + aroma', price: '$19.99'},
                                    ].map((service, i) => (
                                        <div key={i} className="bg-white border-2 border-gray-200 rounded-2xl p-4 flex gap-4 hover:shadow-lg transition cursor-pointer">
                                            <div className="w-16 h-16 bg-purple-100 rounded-lg flex items-center justify-center text-2xl flex-shrink-0">{service.icon}</div>
                                            <div className="flex-1">
                                                <p className="font-bold text-gray-900">{service.name}</p>
                                                <p className="text-xs text-gray-600">{service.desc}</p>
                                                <p className="font-bold text-purple-600 text-lg mt-1">{service.price}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {/* PANTALLA HISTORIAL */}
                            {screen === 'history' && (
                                <div className="p-6 space-y-4">
                                    <h2 className="text-xl font-bold mb-4">Historial</h2>
                                    {[
                                        {id: '#12345', name: 'Lavado Completo', date: '5 May', items: 5, price: '$12.99'},
                                        {id: '#12344', name: 'Lavado Exprés', date: '3 May', items: 3, price: '$8.99'},
                                        {id: '#12343', name: 'Premium', date: '1 May', items: 8, price: '$19.99'},
                                    ].map((order, i) => (
                                        <div key={i} className="bg-white border-2 border-gray-200 rounded-2xl p-4">
                                            <div className="flex justify-between mb-2">
                                                <div>
                                                    <p className="text-sm text-gray-600">{order.id}</p>
                                                    <p className="font-bold">{order.name}</p>
                                                </div>
                                                <span className="bg-green-100 text-green-700 text-xs font-bold px-2 py-1 rounded">✓</span>
                                            </div>
                                            <p className="text-sm text-gray-600">{order.date} • {order.items} prendas • {order.price}</p>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {/* PANTALLA RASTREO */}
                            {screen === 'tracking' && (
                                <div className="p-6 space-y-4">
                                    <h2 className="text-xl font-bold mb-4">Rastreo</h2>
                                    <div className="bg-blue-50 border-2 border-blue-300 rounded-2xl p-4">
                                        <p className="text-sm text-blue-900 font-bold">Tu ropa está en camino</p>
                                        <p className="text-xs text-blue-800 mt-2">📍 A 2.3 km de tu hogar</p>
                                        <p className="text-xs text-blue-800">⏰ Llegará en ~8 minutos</p>
                                    </div>
                                    <div className="space-y-3">
                                        {['Confirmado', 'En camino', 'En proceso', 'Entregando'].map((status, i) => (
                                            <div key={i} className="flex gap-3">
                                                <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold ${i < 2 ? 'bg-purple-600 text-white' : 'bg-gray-200 text-gray-400'}`}>
                                                    {i < 2 ? '✓' : i + 1}
                                                </div>
                                                <div>
                                                    <p className={`font-bold ${i < 2 ? 'text-gray-900' : 'text-gray-400'}`}>{status}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* PANTALLA PERFIL */}
                            {screen === 'profile' && (
                                <div className="bg-gradient-to-br from-purple-600 to-blue-600 text-white p-6">
                                    <div className="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center text-2xl mb-4">👤</div>
                                    <h1 className="text-2xl font-bold">Carolina García</h1>
                                    <p className="text-purple-100">carolina@example.com</p>
                                    <div className="bg-white/10 rounded-2xl p-3 mt-4">
                                        <p className="text-xs text-purple-100">Saldo disponible</p>
                                        <p className="text-2xl font-bold">$15.50</p>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* TAB BAR */}
                        <div className="flex justify-around items-center border-t-2 border-gray-200 p-3 bg-white flex-shrink-0">
                            <button onClick={() => setScreen('home')} className={`flex flex-col items-center py-2 px-4 rounded-lg transition ${screen === 'home' ? 'bg-purple-100 text-purple-600' : 'text-gray-500'}`}>
                                <span className="text-xl">🏠</span>
                                <span className="text-xs font-bold mt-1">Inicio</span>
                            </button>
                            <button onClick={() => setScreen('history')} className={`flex flex-col items-center py-2 px-4 rounded-lg transition ${screen === 'history' ? 'bg-purple-100 text-purple-600' : 'text-gray-500'}`}>
                                <span className="text-xl">📋</span>
                                <span className="text-xs font-bold mt-1">Historial</span>
                            </button>
                            <button onClick={() => setScreen('tracking')} className={`flex flex-col items-center py-2 px-4 rounded-lg transition ${screen === 'tracking' ? 'bg-purple-100 text-purple-600' : 'text-gray-500'}`}>
                                <span className="text-xl">📍</span>
                                <span className="text-xs font-bold mt-1">Rastreo</span>
                            </button>
                            <button onClick={() => setScreen('profile')} className={`flex flex-col items-center py-2 px-4 rounded-lg transition ${screen === 'profile' ? 'bg-purple-100 text-purple-600' : 'text-gray-500'}`}>
                                <span className="text-xl">⚙️</span>
                                <span className="text-xs font-bold mt-1">Perfil</span>
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('app')).render(<App />);
    </script>
</body>
</html>
